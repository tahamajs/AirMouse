# .goreleaser.yml
project_name: airmouse-server

env:
  - GO111MODULE=on
  - CGO_ENABLED=1

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: airmouse-linux
    main: ./cmd/airmouse-server
    binary: airmouse-server
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildTime={{.Date}}
      - -X main.gitCommit={{.Commit}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 7
    env:
      - CGO_ENABLED=1
    tags:
      - netgo
      - osusergo
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: airmouse-linux-noai
    main: ./cmd/airmouse-server
    binary: airmouse-server-noai
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildTime={{.Date}}
      - -X main.gitCommit={{.Commit}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 7
    env:
      - CGO_ENABLED=0
    tags:
      - noai
      - netgo
      - osusergo
    flags:
      - -trimpath

  - id: airmouse-windows
    main: ./cmd/airmouse-server
    binary: airmouse-server
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildTime={{.Date}}
      - -X main.gitCommit={{.Commit}}
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=1
    tags:
      - netgo
    flags:
      - -trimpath

  - id: airmouse-windows-noai
    main: ./cmd/airmouse-server
    binary: airmouse-server-noai
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildTime={{.Date}}
      - -X main.gitCommit={{.Commit}}
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    tags:
      - noai
    flags:
      - -trimpath

  - id: airmouse-darwin
    main: ./cmd/airmouse-server
    binary: airmouse-server
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildTime={{.Date}}
      - -X main.gitCommit={{.Commit}}
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=1
    tags:
      - netgo
    flags:
      - -trimpath

  - id: airmouse-darwin-noai
    main: ./cmd/airmouse-server
    binary: airmouse-server-noai
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.buildTime={{.Date}}
      - -X main.gitCommit={{.Commit}}
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    tags:
      - noai
    flags:
      - -trimpath

archives:
  - id: airmouse-archive
    builds:
      - airmouse-linux
      - airmouse-linux-noai
      - airmouse-windows
      - airmouse-windows-noai
      - airmouse-darwin
      - airmouse-darwin-noai
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}{{ if .Tags }}_noai{{ end }}"
    files:
      - README.md
      - LICENSE
      - config.example.json
      - scripts/install.sh
      - scripts/uninstall.sh
      - scripts/postinstall.sh
      - scripts/preinstall.sh
      - scripts/preremove.sh
      - scripts/postremove.sh

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  groups:
    - title: "🚀 Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "🐛 Bug fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "📚 Documentation"
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "🧹 Chores"
      order: 3
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - 'Merge pull request'
      - 'Merge branch'
      - 'go mod tidy'

brews:
  - name: airmouse-server
    homepage: "https://github.com/yourusername/airmouse-go"
    description: "Air Mouse Pro Server - Turn your phone into a wireless mouse"
    license: "MIT"
    tap:
      owner: yourusername
      name: homebrew-tap
    folder: Formula
    install: |
      bin.install "airmouse-server"
      etc.install "config.example.json" => "airmouse/config.json"
    test: |
      system "#{bin}/airmouse-server --version"
    caveats: |
      To start the server:
        airmouse-server
      To run at login:
        brew services start airmouse-server

nfpms:
  - id: airmouse-nfpm
    package_name: airmouse-server
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    vendor: "AirMouse Team"
    homepage: "https://github.com/yourusername/airmouse-go"
    maintainer: "AirMouse Team <support@airmouse.io>"
    description: "Air Mouse Pro Server - Turn your phone into a wireless mouse"
    license: "MIT"
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    dependencies:
      - libc6
      - libx11-6
      - libxrandr2
      - libxinerama1
      - libxcursor1
      - libxi6
      - libgl1-mesa-glx
    recommends:
      - bluetooth
      - bluez
      - bluez-utils
    suggests:
      - xdotool
      - wmctrl
    files:
      "config.example.json": "/etc/airmouse/config.json"
      "scripts/install.sh": "/usr/lib/airmouse/install.sh"
    config_files:
      "/etc/airmouse/config.json": "config.example.json"
    scripts:
      preinstall: "scripts/preinstall.sh"
      postinstall: "scripts/postinstall.sh"
      preremove: "scripts/preremove.sh"
      postremove: "scripts/postremove.sh"
    rpm:
      group: "System Environment/Daemons"
      summary: "Air Mouse Pro Server"
    deb:
      breaks:
        - airmouse-server-legacy
      recommends:
        - systemd
      suggests:
        - bluetooth
        - bluez

dockers:
  - id: airmouse-docker
    image_templates:
      - "airmouse/airmouse-server:{{ .Version }}"
      - "airmouse/airmouse-server:latest"
      - "ghcr.io/yourusername/airmouse-server:{{ .Version }}"
      - "ghcr.io/yourusername/airmouse-server:latest"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.name=airmouse-server"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/yourusername/airmouse-go"
      - "--platform=linux/amd64,linux/arm64"
    files:
      - config.example.json
    use: buildx
    goos: linux
    goarch: amd64

docker_manifests:
  - name_template: "airmouse/airmouse-server:{{ .Version }}"
    image_templates:
      - "airmouse/airmouse-server:{{ .Version }}-amd64"
      - "airmouse/airmouse-server:{{ .Version }}-arm64"
  - name_template: "airmouse/airmouse-server:latest"
    image_templates:
      - "airmouse/airmouse-server:latest-amd64"
      - "airmouse/airmouse-server:latest-arm64"

release:
  github:
    owner: yourusername
    name: airmouse-go
  draft: false
  prerelease: auto
  name_template: "Air Mouse Pro Server {{.Version}}"
  extra_files:
    - glob: ./dist/*.tar.gz
    - glob: ./dist/*.deb
    - glob: ./dist/*.rpm
    - glob: ./dist/*.apk
    - glob: ./dist/checksums.txt
  header: |
    ## Air Mouse Pro Server {{.Version}}
    
    ### Installation
    
    #### macOS (Homebrew)
    ```bash
    brew tap yourusername/airmouse
    brew install airmouse-server