# .air.toml - Air live‑reload configuration
# See: https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  # The command to build your Go application.
  # If you have a Makefile, you can use "make build" as shown.
  cmd = "make build"
  # Binary output path (relative to root).
  bin = "./tmp/airmouse-server"
  # Full path to the binary (used for Windows if needed).
  full_bin = ""
  # Arguments passed to the binary (e.g., "-c config.toml").
  args_bin = []
  # Delay (in ms) before triggering a rebuild after a change.
  delay = 1000
  # Stop on error during build.
  stop_on_error = false
  # Send interrupt signal (SIGINT) instead of killing the process.
  send_interrupt = false
  # Kill delay after sending interrupt (0 = no delay).
  kill_delay = "0s"
  # Rerun the binary even if the build failed.
  rerun = false
  rerun_delay = 500
  # Exclude directories from watching.
  exclude_dir = ["assets", "tmp", "vendor", "dist", "build"]
  # Exclude specific files.
  exclude_file = []
  # Exclude files matching these regex patterns.
  exclude_regex = ["_test.go"]
  # Do not trigger rebuild for unchanged files.
  exclude_unchanged = false
  # Follow symbolic links.
  follow_symlink = false
  # Include directories (empty = all).
  include_dir = []
  # Include file extensions to watch.
  include_ext = ["go", "tpl", "tmpl", "html"]
  # Include specific files.
  include_file = []
  # Log file for build errors.
  log = "build-errors.log"
  # Polling mode (use if filesystem events are unreliable).
  poll = false
  # Poll interval (only used if poll = true).
  poll_interval = 0
  # Use the host's environment variables (default true).
  # Set to false to isolate.
  # (Not a standard option but can be added; we omit for compatibility)

[color]
  # Colour settings for the terminal output.
  app = ""          # Default colour for app logs
  build = "yellow"  # Build messages
  main = "magenta"  # Main process output
  runner = "green"  # Runner status
  watcher = "cyan"  # File watcher events

[log]
  # Logging behaviour.
  main_only = false   # Only show logs from the main process, not the runner.
  time = false        # Show timestamps in logs.

[misc]
  # Miscellaneous options.
  clean_on_exit = false  # Clean temporary files on exit.

[screen]
  # Terminal screen behaviour.
  clear_on_rebuild = true  # Clear the screen before each rebuild.
  keep_scroll = true        # Keep scrollback history.

