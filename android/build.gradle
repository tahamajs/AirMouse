plugins {
    id 'com.android.application' version '8.5.2' apply false
    id 'com.android.library' version '8.5.2' apply false
    id 'org.jetbrains.kotlin.android' version '2.0.20' apply false
    id 'org.jetbrains.kotlin.plugin.compose' version '2.0.20' apply false
    id 'com.google.dagger.hilt.android' version '2.52' apply false
}

task clean(type: Delete) {
    delete rootProject.buildDir
}

task fixProject(type: Delete) {
    // Remove duplicate implementations from domain package
    delete 'app/src/main/java/com/airmouse/domain/repository/CalibrationRepositoryImpl.kt'
    delete 'app/src/main/java/com/airmouse/domain/repository/ConnectionRepositoryImpl.kt'
    delete 'app/src/main/java/com/airmouse/domain/repository/GestureRepositoryImpl.kt'
    delete 'app/src/main/java/com/airmouse/domain/repository/SettingsRepositoryImpl.kt'
    
    // Remove duplicate DTO from app
    delete 'app/src/main/java/com/airmouse/data/model/NetworkMessage.kt'
}
