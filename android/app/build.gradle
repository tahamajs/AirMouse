plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'kotlin-kapt'
    id 'com.google.dagger.hilt.android'
    id 'org.jetbrains.kotlin.plugin.serialization'   // For JSON serialization
    id 'kotlin-parcelize'                              // For Parcelable data classes
}

android {
    namespace 'com.airmouse'
    compileSdk 34

    defaultConfig {
        applicationId "com.airmouse"
        minSdk 29
        targetSdk 34
        versionCode 100
        versionName "3.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildFeatures {
        compose true
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    composeOptions {
        kotlinCompilerExtensionVersion = "1.5.14"
    }

    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
        release {
            storeFile file("airmouse.keystore")
            storePassword "airmouse"
            keyAlias "airmouse"
            keyPassword "airmouse"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
        debug {
            debuggable true
            signingConfig signingConfigs.debug
        }
    }

    packaging {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }
}

dependencies {
    // Local module
    implementation project(':network')
    implementation "androidx.compose.animation:animation:1.6.0"
    
    // ViewModel and Lifecycle
    implementation "androidx.lifecycle:lifecycle-viewmodel-compose:2.7.0"
    
    // Hilt for dependency injection
    implementation "com.google.dagger:hilt-android:2.48"
    kapt "com.google.dagger:hilt-compiler:2.48"

    // ==================== COMPOSE ====================
    implementation platform('androidx.compose:compose-bom:2024.04.01')
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.ui:ui-graphics'
    implementation 'androidx.compose.ui:ui-tooling-preview'
    implementation 'androidx.compose.material3:material3'
    implementation 'androidx.compose.material:material-icons-extended'
    implementation 'androidx.compose.animation:animation'
    implementation 'androidx.activity:activity-compose:1.8.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-compose:2.8.7'
    implementation 'androidx.navigation:navigation-compose:2.7.7'

    // ==================== CORE ANDROID ====================
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
    implementation 'androidx.core:core-splashscreen:1.0.1'

    // ==================== DEPENDENCY INJECTION (Hilt) ====================
    implementation 'com.google.dagger:hilt-android:2.52'
    kapt 'com.google.dagger:hilt-compiler:2.52'
    implementation 'androidx.hilt:hilt-navigation-compose:1.2.0'

    // ==================== DATASTORE (Preferences) ====================
    implementation 'androidx.datastore:datastore-preferences:1.0.0'

    // ==================== ROOM DATABASE ====================
    implementation 'androidx.room:room-runtime:2.6.1'
    kapt 'androidx.room:room-compiler:2.6.1'
    implementation 'androidx.room:room-ktx:2.6.1'

    // ==================== NETWORKING (OkHttp + WebSocket) ====================
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.squareup.okhttp3:logging-interceptor:4.12.0'
    implementation 'com.google.code.gson:gson:2.11.0'

    // ==================== SERIALIZATION ====================
    implementation 'org.jetbrains.kotlinx:kotlinx-serialization-json:1.6.3'

    // ==================== TENSORFLOW LITE (Gesture Inference) ====================
    implementation 'org.tensorflow:tensorflow-lite:2.16.1'

    // ==================== QR CODE SCANNING ====================
    implementation 'com.journeyapps:zxing-android-embedded:4.3.0'
    implementation 'com.google.zxing:core:3.5.2'

    // ==================== USB SERIAL (Optional – used by network module) ====================
    // (Already in network module, but keep here for completeness)
    // implementation 'com.github.mik3y:usb-serial-for-android:3.8.2'

    // ==================== ACCOMPANIST (System UI Controller) ====================
    implementation 'com.google.accompanist:accompanist-systemuicontroller:0.34.0'

    // ==================== UTILITIES ====================
    implementation 'com.opencsv:opencsv:5.9'                      // CSV export
    implementation 'com.github.PhilJay:MPAndroidChart:v3.1.0'    // Charts (statistics)

    // ==================== TESTING ====================
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'io.mockk:mockk:1.13.10'
    testImplementation 'org.jetbrains.kotlinx:kotlinx-coroutines-test:1.8.1'
    testImplementation 'androidx.arch.core:core-testing:2.2.0'
    testImplementation 'org.robolectric:robolectric:4.11.1'
    testImplementation 'com.squareup.okhttp3:mockwebserver:4.12.0'

    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
    androidTestImplementation "androidx.compose.ui:ui-test-junit4"
    debugImplementation "androidx.compose.ui:ui-tooling"
    debugImplementation "androidx.compose.ui:ui-test-manifest"
}

// Kapt configuration
kapt {
    correctErrorTypes = true
}